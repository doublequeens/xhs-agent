<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/>
<style>
@font-face{font-family:"Heavy";src:url("../../../assets/fonts/templates/Alibaba-PuHuiTi-Heavy.ttf") format("truetype");font-weight:800;}
@font-face{font-family:"SansM";src:url("../../../assets/fonts/templates/HarmonyOS_Sans_SC_Medium.ttf") format("truetype");font-weight:500;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#ddd;}
.page{position:relative;width:1080px;height:1350px;overflow:hidden;margin:0 auto;background:#F45A5A;color:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:90px 80px;}
.tag{font-family:"SansM";font-size:30px;letter-spacing:.22em;color:rgba(255,255,255,.9);}
.h{font-family:"Heavy";font-size:138px;line-height:1.08;color:#fff;margin-top:28px;}
.sub{font-family:"Heavy";font-size:54px;color:#FFE3E3;margin-top:18px;}
.row{display:flex;align-items:center;gap:18px;margin-top:44px;font-family:"SansM";font-size:34px;color:rgba(255,255,255,.95);}
.chat{font-size:46px;}
.pause{position:absolute;left:64px;bottom:64px;width:66px;height:66px;border-radius:50%;background:#5C1414;display:flex;align-items:center;justify-content:center;gap:8px;}
.pause i{display:block;width:7px;height:28px;background:#fff;}
.handle{position:absolute;right:64px;bottom:72px;font-family:"SansM";font-size:24px;color:rgba(255,255,255,.9);}
</style></head><body>
<div class="page">
  <div class="tag">本周护肤重点</div>
  <div class="h">跟着做<br/>就对了！</div>
  <div class="sub">油皮夏日急救 3 步</div>
  <div class="row"><span class="chat">💬</span>评论区告诉我你的痛点</div>
  <div class="pause"><i></i><i></i></div>
  <div class="handle">@成分党·文献派</div>
</div>
</body></html>
