<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/>
<style>
@font-face{font-family:"Sans";src:url("../../../assets/fonts/templates/HarmonyOS_Sans_SC_Regular.ttf") format("truetype");font-weight:400;}
@font-face{font-family:"SansM";src:url("../../../assets/fonts/templates/HarmonyOS_Sans_SC_Medium.ttf") format("truetype");font-weight:500;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#ddd;font-family:"Sans";}
.page{position:relative;width:1080px;height:1350px;overflow:hidden;margin:0 auto;background:#1E5A2E;color:#F3E9D2;display:flex;flex-direction:column;padding:74px 80px;}
.topbar{display:flex;justify-content:space-between;font-size:24px;letter-spacing:.16em;color:#E8C7A0;}
.hero{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:40px;}
.ttl{font-family:"SansM";font-size:104px;line-height:1.05;color:#F3E9D2;text-align:center;}
.folders{display:flex;gap:28px;}
.folder{width:230px;display:flex;flex-direction:column;}
.folder .tab{height:30px;width:62%;border-radius:12px 12px 0 0;}
.folder .body{height:210px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:"SansM";font-size:40px;color:#fff;}
.fp .tab,.fp .body{background:#E58FA0;} .fp .tab{background:#C46B7D;}
.fr .tab,.fr .body{background:#E0453A;} .fr .tab{background:#B82E25;}
.foot{display:flex;justify-content:space-between;font-size:21px;color:#C9B088;}
</style></head><body>
<div class="page">
  <div class="topbar"><span>FAVORITES 2026</span><span>本月好物</span></div>
  <div class="hero">
    <div class="ttl">本月<br/>护肤好物</div>
    <div class="folders">
      <div class="folder fp"><div class="tab"></div><div class="body">洁面</div></div>
      <div class="folder fr"><div class="tab"></div><div class="body">防晒</div></div>
    </div>
  </div>
  <div class="foot"><span>@成分党·文献派</span><span>科学护肤</span></div>
</div>
</body></html>
