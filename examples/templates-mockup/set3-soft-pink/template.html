<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/>
<style>
@font-face{font-family:"Sans";src:url("../../../assets/fonts/templates/HarmonyOS_Sans_SC_Regular.ttf") format("truetype");font-weight:400;}
@font-face{font-family:"SansM";src:url("../../../assets/fonts/templates/HarmonyOS_Sans_SC_Medium.ttf") format("truetype");font-weight:500;}
@font-face{font-family:"Bodoni";src:url("../../../assets/fonts/beauty-editorial-v1/BodoniModa-Regular.ttf") format("truetype");}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#ddd;font-family:"Sans";}
.page{position:relative;width:1080px;height:1350px;overflow:hidden;margin:0 auto;display:flex;flex-direction:column;padding:78px 80px;background:#F8DADA;color:#3a2020;}

/* cover */
.c .topbar{display:flex;justify-content:space-between;font-size:22px;letter-spacing:.16em;color:#b06a72;}
.c .hero{flex:1;display:flex;flex-direction:column;justify-content:center;gap:26px;}
.c .row{display:flex;align-items:center;gap:34px;}
.c .num{font-family:"SansM";font-size:300px;line-height:.78;color:#EE5C5C;letter-spacing:-.04em;}
.c .ttl{font-family:"SansM";font-size:78px;line-height:1.12;color:#D8444C;}
.c .sub{font-size:34px;color:#7a444c;max-width:560px;}
.c .doodle{align-self:flex-end;font-size:96px;line-height:1;}
.c .foot{display:flex;justify-content:space-between;font-size:21px;color:#a86a72;}

/* inner */
.i .wrap{flex:1;display:flex;align-items:center;}
.i .card{position:relative;background:#fff;border-radius:32px;padding:62px 56px;width:100%;display:flex;flex-direction:column;gap:20px;box-shadow:0 16px 44px rgba(216,68,76,.16);}
.i .daisy{position:absolute;top:-30px;right:44px;font-size:64px;}
.i .tip{align-self:flex-start;background:#EE5C5C;color:#fff;font-family:"SansM";font-size:27px;padding:10px 28px;border-radius:999px;letter-spacing:.08em;}
.i .h{font-family:"SansM";font-size:60px;color:#3a2020;line-height:1.15;}
.i .p{font-size:35px;line-height:1.65;color:#6a4444;}
.i .keys{display:flex;gap:13px;flex-wrap:wrap;}
.i .key{font-size:27px;color:#D8444C;background:#FDEAEC;padding:12px 24px;border-radius:999px;}
.i .pg{position:absolute;right:80px;bottom:58px;font-family:"Bodoni";font-size:32px;color:#d8a0a0;}
</style></head><body>

<!-- cover -->
<div class="page c">
  <div class="topbar"><span>MISTIPS</span><span>科学护肤</span></div>
  <div class="hero">
    <div class="row">
      <div class="num">5</div>
      <div><div class="ttl">护肤<br/>清晰法则</div><div class="sub" style="margin-top:16px;">看懂这 5 条，少走弯路</div></div>
    </div>
    <div class="doodle">👧 ✨</div>
  </div>
  <div class="foot"><span>@成分党·文献派</span><span>科学护肤</span></div>
</div>

<!-- inner -->
<div class="page i">
  <div class="wrap">
    <div class="card">
      <div class="daisy">🌼</div>
      <div class="tip">TIP 1</div>
      <div class="h">精简，是第一步</div>
      <div class="p">护肤不是越多越好。把步骤收敛到「清洁 — 保湿 — 防晒」三件套，皮肤反而更稳、更耐造。</div>
      <div class="keys"><span class="key">清洁</span><span class="key">保湿</span><span class="key">防晒</span></div>
    </div>
  </div>
  <div class="pg">02 / 05</div>
</div>

</body></html>
