<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/>
<style>
@font-face{font-family:"Sans";src:url("../../../assets/fonts/templates/HarmonyOS_Sans_SC_Regular.ttf") format("truetype");font-weight:400;}
@font-face{font-family:"SansM";src:url("../../../assets/fonts/templates/HarmonyOS_Sans_SC_Medium.ttf") format("truetype");font-weight:500;}
@font-face{font-family:"Bodoni";src:url("../../../assets/fonts/beauty-editorial-v1/BodoniModa-Regular.ttf") format("truetype");}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#ddd;font-family:"Sans";}
.page{position:relative;width:1080px;height:1350px;overflow:hidden;margin:0 auto;display:flex;flex-direction:column;padding:74px 80px;background:#0E5A5A;color:#fff;}

/* cover */
.c .topbar{display:flex;justify-content:space-between;font-size:22px;letter-spacing:.2em;color:rgba(255,255,255,.7);}
.c .line{height:2px;background:rgba(255,255,255,.3);margin:18px 0 0;}
.c .hero{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:10px;}
.c .ico{font-size:84px;margin-bottom:6px;}
.c .num{font-family:"SansM";font-size:300px;line-height:.78;color:#fff;letter-spacing:-.05em;}
.c .title{font-family:"SansM";font-size:66px;letter-spacing:.05em;color:#fff;margin-top:18px;}
.c .sub{font-size:32px;color:rgba(255,255,255,.78);margin-top:8px;}
.c .foot{display:flex;justify-content:space-between;font-size:21px;color:rgba(255,255,255,.6);}
.c .footline{height:2px;background:rgba(255,255,255,.3);margin:0 0 18px;}

/* inner */
.i .body{flex:1;display:flex;flex-direction:column;justify-content:center;gap:20px;}
.i .tag{font-family:"SansM";font-size:28px;letter-spacing:.12em;color:#7FD6D6;}
.i .big{font-family:"SansM";font-size:190px;line-height:.9;color:#fff;}
.i .h{font-family:"SansM";font-size:62px;line-height:1.2;}
.i .p{font-size:36px;line-height:1.6;color:rgba(255,255,255,.92);max-width:840px;}
.i .keys{display:flex;gap:14px;flex-wrap:wrap;}
.i .key{font-size:28px;padding:12px 26px;border:2px solid rgba(255,255,255,.55);border-radius:999px;color:#fff;}
.i .pg{align-self:flex-end;font-family:"Bodoni";font-size:32px;color:rgba(255,255,255,.6);}
.i .foot{display:flex;justify-content:space-between;font-size:21px;color:rgba(255,255,255,.55);margin-top:18px;}
</style></head><body>

<!-- cover -->
<div class="page c">
  <div class="topbar"><span>MISTIPS</span><span>夏日护肤</span></div>
  <div class="line"></div>
  <div class="hero">
    <div class="num">5</div>
    <div class="title">夏日护肤清单</div>
    <div class="sub">油皮通勤 · 5 个关键习惯</div>
  </div>
  <div class="footline"></div>
  <div class="foot"><span>@成分党·文献派</span><span>科学护肤</span></div>
</div>

<!-- inner -->
<div class="page i">
  <div class="body">
    <div class="tag">TIP 01</div>
    <div class="big">01</div>
    <div class="h">清晨温水洁面</div>
    <div class="p">早上只用温水或少量氨基酸洁面，保留皮脂膜；过度清洁反而让油皮越洗越油。</div>
    <div class="keys"><span class="key">温水</span><span class="key">氨基酸</span><span class="key">≤30 秒</span></div>
  </div>
  <div class="foot"><span>@成分党·文献派</span><span>科学护肤</span></div>
</div>

</body></html>
